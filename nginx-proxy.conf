server {

    listen 80;

    server_name _;


   # ── Frontend (SPA) ──────────────────────────────────

    location / {

        proxy_pass http://frontend:80;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

    }


    # ── Catalogue API ───────────────────────────────────

    location /api/catalog {

        proxy_pass http://10.1.1.4:4000/api/catalog;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

    }


    # ── Orders API ──────────────────────────────────────

    location /api/orders {

        proxy_pass http://10.1.1.4:8000/api/orders;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

    }


    # ── Payment API ─────────────────────────────────────

    location /api/payments {

        proxy_pass http://10.1.1.4:8082/api/payments;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

    }

}

